name: Build root base image

on:
  push:
    branches: [main]
    paths:
      - rsc/root/**
  schedule:
    # First Saturday of each month at 22:00 UTC (before Sunday's weekly release).
    - cron: '0 22 1-7 * 6'
  workflow_dispatch:

permissions:
  actions: read
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      build-date: ${{ steps.date.outputs.value }}
    steps:
      - id: date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

  docker-build:
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Maximize Docker Space
        run: |
          sudo systemctl stop docker
          sudo mv /var/lib/docker /mnt/
          sudo ln -s /mnt/docker /var/lib/docker
          sudo systemctl start docker
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/caic-xyz/md-root
          flavor: |
            suffix=-${{ matrix.arch }},latest=false
          tags: |
            type=sha
            type=raw,value=${{ needs.setup.outputs.build-date }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.version=${{ needs.setup.outputs.build-date }}
      - name: Prepare reports directory
        run: mkdir -p reports/${{ matrix.arch }}
      - name: Build platform specific image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: rsc/root
          file: rsc/root/Dockerfile
          platforms: ${{ matrix.platform }}
          target: reports
          outputs: type=local,dest=reports/${{ matrix.arch }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
      - name: Report Build Timings
        run: |
          echo "### Build Timings (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          cat reports/${{ matrix.arch }}/build_timings.md >> $GITHUB_STEP_SUMMARY
      - name: Push platform specific image
        uses: docker/build-push-action@v6
        id: push
        if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
        with:
          context: rsc/root
          file: rsc/root/Dockerfile
          platforms: ${{ matrix.platform }}
          target: final
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: |
            org.opencontainers.image.description=Root base layer with system packages for the md dev environment.
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          provenance: false
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
      - name: Attest Built Images
        uses: actions/attest-build-provenance@v3
        if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
        with:
          subject-name: ghcr.io/caic-xyz/md-root
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Upload build timings
        uses: actions/upload-artifact@v6
        with:
          name: reports-${{ matrix.arch }}
          path: reports/${{ matrix.arch }}

  merge-manifests:
    needs: [setup, docker-build]
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/caic-xyz/md-root
          tags: |
            type=sha
            type=raw,value=${{ needs.setup.outputs.build-date }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.version=${{ needs.setup.outputs.build-date }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and Push Manifests
        id: push
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          FIRST_TAG=$(echo "$TAGS" | head -n 1)
          TAG_ARGS=$(echo "$TAGS" | awk '{printf "-t %s ", $0}')
          docker buildx imagetools create $TAG_ARGS \
            --annotation "org.opencontainers.image.description=Root base layer with system packages for the md dev environment." \
            --annotation "org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${FIRST_TAG}-amd64" "${FIRST_TAG}-arm64"
          DIGEST=$(docker buildx imagetools inspect "${FIRST_TAG}" | grep "Digest:" | head -n 1 | awk '{print $2}')
          echo "image=${FIRST_TAG%:*}" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: Attest Built Images
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ steps.push.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

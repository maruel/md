name: Build user base image

on:
  push:
    branches: [main]
    paths:
      - rsc/user/**
  schedule:
    # Every Sunday at midnight UTC.
    - cron: '0 0 * * 0'
  pull_request:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build root base image"]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  setup:
    # Skip if triggered by a failed root image build.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    outputs:
      build-date: ${{ steps.date.outputs.value }}
    steps:
      - id: date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

  docker-build:
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Maximize Docker Space
        run: |
          sudo systemctl stop docker
          sudo mv /var/lib/docker /mnt/
          sudo ln -s /mnt/docker /var/lib/docker
          sudo systemctl start docker
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/caic-xyz/md-user
          flavor: |
            suffix=-${{ matrix.arch }},latest=false
          tags: |
            type=sha
            type=raw,value=${{ needs.setup.outputs.build-date }}
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_run' }}
          labels: |
            org.opencontainers.image.version=${{ needs.setup.outputs.build-date }}
      - name: Prepare reports directory
        run: mkdir -p reports/${{ matrix.arch }}
      - name: Build platform specific image
        uses: docker/build-push-action@v7
        id: build
        with:
          context: rsc/user
          file: rsc/user/Dockerfile
          platforms: ${{ matrix.platform }}
          target: reports
          outputs: type=local,dest=reports/${{ matrix.arch }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
      - name: Report Build Timings
        run: |
          echo "### Build Timings (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          cat reports/${{ matrix.arch }}/build_timings.md >> $GITHUB_STEP_SUMMARY
      - name: Push platform specific image
        uses: docker/build-push-action@v7
        id: push
        if: ${{ github.event_name != 'pull_request' }}
        with:
          context: rsc/user
          file: rsc/user/Dockerfile
          platforms: ${{ matrix.platform }}
          target: final
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: |
            org.opencontainers.image.description=Dev environment with Go, Python, Node, Rust, and more.
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          provenance: false
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
      - name: Attest Built Images
        uses: actions/attest-build-provenance@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          subject-name: ghcr.io/caic-xyz/md-user
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Upload tool versions
        uses: actions/upload-artifact@v7
        with:
          name: reports-${{ matrix.arch }}
          path: reports/${{ matrix.arch }}

  merge-manifests:
    needs: [setup, docker-build]
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    env:
      REGISTRY: ghcr.io
      TRUSTED_BUILDER_NAME: "https://github.com/actions/runner/-/github.com/actions/runner"
    steps:
      - uses: actions/checkout@v6
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/caic-xyz/md-user
          tags: |
            type=sha
            type=raw,value=${{ needs.setup.outputs.build-date }}
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_run' }}
          labels: |
            org.opencontainers.image.version=${{ needs.setup.outputs.build-date }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all reports
        uses: actions/download-artifact@v8
        with:
          pattern: reports-*
          path: reports
          merge-multiple: false
      - name: Merge and Upload Reports
        run: |
          python3 .github/scripts/merge_tool_versions.py --amd64 reports/reports-amd64/tool_versions.md --arm64 reports/reports-arm64/tool_versions.md --output reports/tool_versions.md >> $GITHUB_STEP_SUMMARY
      - name: Create and Push Manifests
        id: push
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          FIRST_TAG=$(echo "$TAGS" | head -n 1)
          TAG_ARGS=$(echo "$TAGS" | awk '{printf "-t %s ", $0}')
          docker buildx imagetools create $TAG_ARGS \
            --annotation "org.opencontainers.image.description=Dev environment with Go, Python, Node, Rust, and more." \
            --annotation "org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${FIRST_TAG}-amd64" "${FIRST_TAG}-arm64"
          DIGEST=$(docker buildx imagetools inspect "${FIRST_TAG}" | grep "Digest:" | head -n 1 | awk '{print $2}')
          echo "image=${FIRST_TAG%:*}" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: Attest Built Images
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.push.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Upload final tool versions
        uses: actions/upload-artifact@v7
        with:
          name: tool-versions
          path: reports/tool_versions.md

name: Build container image

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  actions: read
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      build-date: ${{ steps.date.outputs.value }}
    steps:
      - id: date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

  docker-build:
    needs: [setup]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Maximize Docker Space
        run: |
          sudo systemctl stop docker
          sudo mv /var/lib/docker /mnt/
          sudo ln -s /mnt/docker /var/lib/docker
          sudo systemctl start docker
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_call') }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            suffix=-${{ matrix.arch }},latest=false
          tags: |
            type=sha
            type=raw,value=${{ needs.setup.outputs.build-date }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' && inputs.version == '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
          labels: |
            org.opencontainers.image.version=${{ inputs.version || needs.setup.outputs.build-date }}
      - name: Build and load image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: rsc
          file: rsc/Dockerfile.base
          platforms: ${{ matrix.platform }}
          target: final
          load: true
          tags: md-smoke-test:latest
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
      - name: Extract reports
        run: |
          mkdir -p reports/${{ matrix.arch }}
          cid=$(docker create md-smoke-test:latest)
          docker cp "$cid:/home/user/src/tool_versions.md" "reports/${{ matrix.arch }}/tool_versions.md"
          docker cp "$cid:/var/log/build_timings.md" "reports/${{ matrix.arch }}/build_timings.md"
          docker rm "$cid"
          echo "### Build Timings (${{ matrix.arch }})" >> "$GITHUB_STEP_SUMMARY"
          cat "reports/${{ matrix.arch }}/build_timings.md" >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Smoke test
        run: |
          go build -o /tmp/md-test ./cmd/md/
          tmp=$(mktemp -d)
          git clone --depth=1 -b "$GITHUB_REF_NAME" "file://$PWD" "$tmp/md" 2>/dev/null \
            || git clone --depth=1 "file://$PWD" "$tmp/md"
          cd "$tmp/md"
          git checkout -B smoke-test
          /tmp/md-test run --image md-smoke-test:latest --no-caches -- cat /home/user/src/tool_versions.md
          rm -rf "$tmp"
      - name: Push platform specific image
        uses: docker/build-push-action@v6
        id: push
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_call') }}
        with:
          context: rsc
          file: rsc/Dockerfile.base
          platforms: ${{ matrix.platform }}
          target: final
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: |
            org.opencontainers.image.description=Dev environment with Go, Python, Node, Rust, and more.
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          provenance: false
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
      - name: Attest Built Images
        uses: actions/attest-build-provenance@v3
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_call') }}
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Upload tool versions
        uses: actions/upload-artifact@v6
        with:
          name: reports-${{ matrix.arch }}
          path: reports/${{ matrix.arch }}

  merge-manifests:
    needs: [setup, docker-build]
    if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_call') }}
    runs-on: ubuntu-24.04
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      TRUSTED_BUILDER_NAME: "https://github.com/actions/runner/-/github.com/actions/runner"
    steps:
      - uses: actions/checkout@v6
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=${{ needs.setup.outputs.build-date }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' && inputs.version == '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
          labels: |
            org.opencontainers.image.version=${{ inputs.version || needs.setup.outputs.build-date }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all reports
        uses: actions/download-artifact@v6
        with:
          pattern: reports-*
          path: reports
          merge-multiple: false
      - name: Merge and Upload Reports
        run: |
          python3 .github/scripts/merge_tool_versions.py --amd64 reports/reports-amd64/tool_versions.md --arm64 reports/reports-arm64/tool_versions.md --output reports/tool_versions.md >> $GITHUB_STEP_SUMMARY
      - name: Create and Push Manifests
        id: push
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          FIRST_TAG=$(echo "$TAGS" | head -n 1)
          TAG_ARGS=$(echo "$TAGS" | awk '{printf "-t %s ", $0}')
          docker buildx imagetools create $TAG_ARGS \
            --annotation "org.opencontainers.image.description=Dev environment with Go, Python, Node, Rust, and more." \
            --annotation "org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${FIRST_TAG}-amd64" "${FIRST_TAG}-arm64"
          DIGEST=$(docker buildx imagetools inspect "${FIRST_TAG}" | grep "Digest:" | head -n 1 | awk '{print $2}')
          echo "image=${FIRST_TAG%:*}" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: Attest Built Images
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ steps.push.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Upload final tool versions
        uses: actions/upload-artifact@v6
        with:
          name: tool-versions
          path: reports/tool_versions.md
